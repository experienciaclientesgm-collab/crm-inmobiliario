<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRMS - Gestión Inmobiliaria</title>
    <!-- Tailwind CSS para el diseño -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React y Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- CDN de Supabase -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <!-- Tipografía Moderna -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        @keyframes pulse-soft {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(0.96); }
        }
        .pulse-critical {
            animation: pulse-soft 2s infinite ease-in-out;
        }
    </style>
</head>
<body class="bg-[#F3F4F6] text-[#111827] min-h-screen flex flex-col antialiased">

    <div id="root" class="flex flex-col min-h-screen"></div>

    <script type="text/babel">
        // ---------- CONFIGURACIÓN DE SUPABASE ----------
        const SUPABASE_URL = "https://rjymgzlncuyyxytkvrcr.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable__Ke4zfQ8QyIsp7dIvrBQHw_yQ3yxQ1Z"; 
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ---------- CONFIGURACIÓN DE NEGOCIO PERSONALIZADO ----------
        const ASESORES = [
            "Sin asignar",
            "Facundo Auada",
            "Kevin Aparicio",
            "Brokersita (Admin)"
        ];

        const PROYECTOS = [
            "San miguel - La Marina",
            "San Miguel - Faucett",
            "La Molina - La encantada"
        ];

        const TIPIFICACIONES = [
            "Sin tipificar",
            "Interesado - Agenda visita",
            "Interesado - Solicita info",
            "Interesado - En seguimiento",
            "No contesta",
            "Buzón de voz",
            "Número equivocado",
            "No interesado",
            "Fuera de presupuesto",
            "Ya compró / descartado",
            "Cierre - Vendido"
        ];

        const FUENTES_CONFIG = {
            "Meta Ads (FB/IG)": { bg: "bg-[#1877F2]/10 text-[#1877F2] border-[#1877F2]/20", label: "Meta Ads 🔵" },
            "TikTok Ads": { bg: "bg-[#000000]/10 text-[#000000] border-[#000000]/20", label: "TikTok 🎬" },
            "Google Ads": { bg: "bg-[#EA4335]/10 text-[#EA4335] border-[#EA4335]/20", label: "Google 🔴" },
            "WhatsApp": { bg: "bg-[#25D366]/10 text-[#25D366] border-[#25D366]/20", label: "WhatsApp 🟢" },
            "Sala de ventas": { bg: "bg-purple-50 text-purple-700 border-purple-200", label: "Físico 🏢" },
            "Otro": { bg: "bg-gray-100 text-gray-600 border-gray-200", label: "Otro 🌐" }
        };

        const SEMAFORO = {
            verde: { color: "bg-emerald-500 text-emerald-700 bg-emerald-50", border: "border-emerald-200", label: "Óptimo (0-30s)" },
            amarillo: { color: "bg-amber-500 text-amber-700 bg-amber-50", border: "border-amber-200", label: "Aceptable (30s-2m)" },
            naranja: { color: "bg-orange-500 text-orange-700 bg-orange-50", border: "border-orange-200", label: "Demora (2-5m)" },
            rojo: { color: "bg-rose-500 text-rose-700 bg-rose-50 border-rose-200 pulse-critical", border: "border-rose-200", label: "Crítico (+5m)" },
            gris: { color: "bg-gray-400 text-gray-600 bg-gray-50", border: "border-gray-200", label: "Sin contactar" }
        };

        function getSemaforo(lead) {
            if (!lead.primer_contacto_seg) {
                const elapsed = (Date.now() - new Date(lead.fecha_ingreso).getTime()) / 1000;
                if (elapsed <= 30) return { key: "verde", segundos: elapsed };
                if (elapsed <= 120) return { key: "amarillo", segundos: elapsed };
                if (elapsed <= 300) return { key: "naranja", segundos: elapsed };
                return { key: "rojo", segundos: elapsed };
            }
            const s = lead.primer_contacto_seg;
            if (s <= 30) return { key: "verde", segundos: s };
            if (s <= 120) return { key: "amarillo", segundos: s };
            if (s <= 300) return { key: "naranja", segundos: s };
            return { key: "rojo", segundos: s };
        }

        function fmtSegundos(s) {
            if (s < 60) return `${Math.round(s)}s`;
            const m = Math.floor(s / 60);
            const rest = Math.round(s % 60);
            return `${m}m ${rest}s`;
        }

        // ---------- COMPONENTE PRINCIPAL ----------
        function CRMInmobiliario() {
            const [leads, setLeads] = React.useState([]);
            const [loaded, setLoaded] = React.useState(false);
            const [selectedLead, setSelectedLead] = React.useState(null);
            const [showNewLead, setShowNewLead] = React.useState(false);
            const [search, setSearch] = React.useState("");
            const [, forceTick] = React.useState(0);

            React.useEffect(() => {
                async function fetchLeads() {
                    const { data, error } = await supabase
                        .from('leads')
                        .select('*')
                        .order('fecha_ingreso', { ascending: false });
                    
                    if (!error) setLeads(data || []);
                    setLoaded(true);
                }

                fetchLeads();

                const channel = supabase
                    .channel('schema-db-changes')
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'leads' }, () => {
                        fetchLeads();
                    })
                    .subscribe();

                return () => {
                    supabase.removeChannel(channel);
                };
            }, []);

            React.useEffect(() => {
                const interval = setInterval(() => {
                    forceTick(n => n + 1);
                }, 1000);
                return () => clearInterval(interval);
            }, []);

            const handleCreateLead = async (form) => {
                const { error } = await supabase
                    .from('leads')
                    .insert([
                        {
                            nombre: form.nombre,
                            telefono: form.telefono,
                            email: form.email,
                            fuente: form.fuente,
                            proyecto: form.proyecto,
                            tipificacion: "Sin tipificar",
                            asesor: form.asesor || "Sin asignar"
                        }
                    ]);

                if (error) {
                    alert("Error al crear el lead: " + error.message);
                } else {
                    setShowNewLead(false);
                }
            };

            const handleUpdateField = async (leadId, field, value) => {
                const { error } = await supabase
                    .from('leads')
                    .update({ [field]: value })
                    .eq('id', leadId);

                if (error) {
                    alert(`Error al actualizar ${field}: ` + error.message);
                } else {
                    setSelectedLead(prev => prev ? { ...prev, [field]: value } : null);
                }
            };

            const handleRegistrarContacto = async (lead) => {
                if (lead.primer_contacto_seg) return;
                const segundosAtencion = (Date.now() - new Date(lead.fecha_ingreso).getTime()) / 1000;
                
                const { error } = await supabase
                    .from('leads')
                    .update({ primer_contacto_seg: Math.round(segundosAtencion) })
                    .eq('id', lead.id);

                if (error) {
                    alert("Error al registrar contacto: " + error.message);
                } else {
                    setSelectedLead(null);
                }
            };

            const filteredLeads = React.useMemo(() => {
                const q = search.trim().toLowerCase();
                if (!q) return leads;
                return leads.filter(l => 
                    (l.nombre || "").toLowerCase().includes(q) ||
                    (l.telefono || "").includes(q) ||
                    (l.proyecto || "").toLowerCase().includes(q) ||
                    (l.asesor || "").toLowerCase().includes(q)
                );
            }, [leads, search]);

            const triggerWhatsApp = (lead, e) => {
                e.stopPropagation(); 
                const cleanPhone = lead.telefono.replace(/\D/g, "");
                // Prefijo Perú (+51) por defecto si tiene 9 dígitos
                const formattedPhone = cleanPhone.length === 9 ? `51${cleanPhone}` : cleanPhone;
                const text = encodeURIComponent(`Hola ${lead.nombre}, gracias por tu interés en nuestro proyecto ${lead.proyecto || ''}. Te saluda un asesor de CRMS, ¿cómo te encuentras hoy?`);
                window.open(`https://wa.me/${formattedPhone}?text=${text}`, '_blank');
            };

            const triggerCall = (lead, e) => {
                e.stopPropagation(); 
                window.open(`tel:${lead.telefono}`, '_self');
            };

            if (!loaded) {
                return (
                    <div class="flex items-center justify-center min-h-screen bg-[#F3F4F6]">
                        <div class="flex flex-col items-center gap-3">
                            <div class="w-10 h-10 border-4 border-[#111827] border-t-transparent rounded-full animate-spin"></div>
                            <div class="text-xs font-bold text-gray-500 tracking-widest uppercase">Iniciando CRMS...</div>
                        </div>
                    </div>
                );
            }

            return (
                <div class="min-h-screen flex flex-col">
                    {/* Header */}
                    <header class="bg-[#111827] text-white px-8 py-4.5 flex justify-between items-center shadow-md">
                        <div class="flex items-center gap-3">
                            <div class="bg-gradient-to-tr from-[#EA4335] to-[#1877F2] p-2 rounded-xl text-white font-extrabold text-sm tracking-tighter">
                                CRMS
                            </div>
                            <div>
                                <h1 class="font-extrabold text-lg tracking-tight leading-none">CRMS</h1>
                                <p class="text-[10px] text-gray-400 mt-1 uppercase tracking-widest font-bold">Inbound Leads Engine</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-2 bg-gray-900 px-3 py-1.5 rounded-xl border border-gray-800">
                            <span class="w-2.5 h-2.5 bg-emerald-500 rounded-full animate-pulse"></span>
                            <span class="text-[11px] font-bold text-gray-400 tracking-wider">REALTIME LINK ACTIVE</span>
                        </div>
                    </header>

                    {/* Dashboard */}
                    <main class="flex-1 p-6 max-w-7xl mx-auto w-full">
                        {/* Buscador & Nuevo Lead */}
                        <div class="flex flex-col md:flex-row justify-between items-stretch md:items-center mb-6 gap-4">
                            <div class="relative flex-1 max-w-md">
                                <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-gray-400">🔍</span>
                                <input 
                                    type="text" 
                                    placeholder="Buscar lead, proyecto, fono o asesor..." 
                                    value={search}
                                    onChange={(e) => setSearch(e.target.value)}
                                    class="w-full pl-10 pr-4 py-3 bg-white border border-gray-200 rounded-2xl text-sm font-medium focus:outline-none focus:ring-2 focus:ring-[#111827]/10 focus:border-[#111827] transition-all shadow-sm"
                                />
                            </div>
                            <button 
                                onClick={() => setShowNewLead(true)}
                                class="bg-[#111827] hover:bg-gray-800 text-white px-5 py-3 rounded-2xl text-xs font-extrabold tracking-wider uppercase transition-all flex items-center justify-center gap-2 shadow-sm"
                            >
                                ⚡ Nuevo Prospecto
                            </button>
                        </div>

                        {/* Monitor de Tiempos de Respuesta */}
                        <div class="grid grid-cols-1 md:grid-cols-5 gap-3 mb-6">
                            {Object.entries(SEMAFORO).map(([key, value]) => (
                                <div key={key} class={`p-3 rounded-2xl border ${value.color} flex flex-col justify-between`}>
                                    <span class="text-[10px] font-bold uppercase tracking-wider opacity-70">{value.label}</span>
                                    <span class="text-xs font-semibold mt-1">
                                        {key === 'verde' && 'Atención Ideal'}
                                        {key === 'amarillo' && 'Límite aceptable'}
                                        {key === 'naranja' && 'Retraso comercial'}
                                        {key === 'rojo' && '¡Pérdida inminente!'}
                                        {key === 'gris' && 'Contacto establecido'}
                                    </span>
                                </div>
                            ))}
                        </div>

                        {/* Tabla Ultra-Dinámica */}
                        <div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden">
                            <div class="overflow-x-auto">
                                <table class="w-full border-collapse text-left text-sm">
                                    <thead class="bg-[#111827] text-white text-[10px] font-extrabold uppercase tracking-widest">
                                        <tr>
                                            <th class="p-4.5 text-center w-12">Alerta</th>
                                            <th class="p-4.5">Lead / Contacto</th>
                                            <th class="p-4.5">Acciones Rápidas</th>
                                            <th class="p-4.5">Proyecto</th>
                                            <th class="p-4.5">Origen / Campaña</th>
                                            <th class="p-4.5">Asesor Asignado</th>
                                            <th class="p-4.5">Semaforización</th>
                                            <th class="p-4.5">Estado</th>
                                        </tr>
                                    </thead>
                                    <tbody class="divide-y divide-gray-100">
                                        {filteredLeads.length === 0 ? (
                                            <tr>
                                                <td colSpan="8" class="p-12 text-center text-gray-400 font-semibold">Sin leads en este momento.</td>
                                            </tr>
                                        ) : (
                                            filteredLeads.map(lead => {
                                                const sem = getSemaforo(lead);
                                                const semStyle = SEMAFORO[sem.key];
                                                const fuenteStyle = FUENTES_CONFIG[lead.fuente] || FUENTES_CONFIG["Otro"];
                                                const yaContactado = !!lead.primer_contacto_seg;

                                                return (
                                                    <tr 
                                                        key={lead.id} 
                                                        onClick={() => setSelectedLead(lead)}
                                                        class="hover:bg-gray-50/80 cursor-pointer transition-all duration-100"
                                                    >
                                                        {/* Alerta */}
                                                        <td class="p-4 text-center" onClick={e => e.stopPropagation()}>
                                                            <span class={`w-3.5 h-3.5 rounded-full inline-block ${semStyle.color.split(' ')[0]} ring-4 ring-offset-2 ring-transparent ${!yaContactado && sem.key === 'rojo' ? 'animate-bounce' : ''}`}></span>
                                                        </td>

                                                        {/* Nombre y Contacto */}
                                                        <td class="p-4">
                                                            <div class="flex flex-col">
                                                                <span class="font-extrabold text-gray-900 text-sm leading-tight">{lead.nombre}</span>
                                                                <span class="text-xs text-gray-400 mt-0.5">{lead.telefono}</span>
                                                            </div>
                                                        </td>

                                                        {/* Acción Rápida */}
                                                        <td class="p-4" onClick={e => e.stopPropagation()}>
                                                            <div class="flex gap-1.5">
                                                                <button 
                                                                    onClick={(e) => triggerWhatsApp(lead, e)}
                                                                    class="bg-emerald-500 hover:bg-emerald-600 text-white px-2.5 py-1.5 rounded-xl text-xs font-bold transition-all flex items-center gap-1"
                                                                    title="Chatear ya"
                                                                >
                                                                    💬 <span class="hidden lg:inline">WhatsApp</span>
                                                                </button>
                                                                <button 
                                                                    onClick={(e) => triggerCall(lead, e)}
                                                                    class="bg-gray-900 hover:bg-black text-white px-2.5 py-1.5 rounded-xl text-xs font-bold transition-all flex items-center gap-1"
                                                                    title="Llamar ya"
                                                                >
                                                                    📞 <span class="hidden lg:inline">Llamar</span>
                                                                </button>
                                                            </div>
                                                        </td>

                                                        {/* Proyecto */}
                                                        <td class="p-4 font-bold text-gray-800 text-xs tracking-wide uppercase">{lead.proyecto || "—"}</td>

                                                        {/* Origen */}
                                                        <td class="p-4">
                                                            <span class={`inline-block px-3 py-1 rounded-full text-[10px] font-extrabold border ${fuenteStyle.bg}`}>
                                                                {fuenteStyle.label}
                                                            </span>
                                                        </td>

                                                        {/* Asesor */}
                                                        <td class="p-4">
                                                            <span class={`px-2.5 py-1 rounded-xl text-xs font-bold border ${lead.asesor && lead.asesor !== 'Sin asignar' ? 'bg-amber-50 text-amber-800 border-amber-200' : 'bg-gray-50 text-gray-400 border-gray-100'}`}>
                                                                👤 {lead.asesor || "Sin asignar"}
                                                            </span>
                                                        </td>

                                                        {/* Cronómetro */}
                                                        <td class="p-4 font-mono font-extrabold text-xs">
                                                            <span class={`px-2.5 py-1 rounded-lg ${yaContactado ? 'bg-gray-100 text-gray-500' : semStyle.color} border`}>
                                                                ⏱️ {fmtSegundos(sem.segundos)}
                                                                {!yaContactado && <span class="text-[9px] font-bold ml-1 opacity-60">espera</span>}
                                                            </span>
                                                        </td>

                                                        {/* Estado */}
                                                        <td class="p-4">
                                                            <span class="bg-gray-100 text-gray-800 px-3 py-1 rounded-full text-xs font-bold border border-gray-200">
                                                                {lead.tipificacion}
                                                            </span>
                                                        </td>
                                                    </tr>
                                                );
                                            })
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </main>

                    {/* Modal: Nuevo Lead */}
                    {showNewLead && (
                        <Modal onClose={() => setShowNewLead(false)}>
                            <h2 class="text-lg font-black text-gray-900 mb-4 flex items-center gap-2 tracking-tight">
                                🚀 REGISTRAR NUEVO LEAD
                            </h2>
                            <LeadForm onSave={handleCreateLead} onCancel={() => setShowNewLead(false)} />
                        </Modal>
                    )}

                    {/* Modal: Detalle de Lead */}
                    {selectedLead && (
                        <Modal onClose={() => setSelectedLead(null)}>
                            <div class="flex justify-between items-start border-b border-gray-100 pb-3 mb-4">
                                <div>
                                    <h2 class="text-lg font-black text-gray-900 tracking-tight">{selectedLead.nombre}</h2>
                                    <p class="text-xs text-gray-400 mt-0.5">Ingreso: {new Date(selectedLead.fecha_ingreso).toLocaleString()}</p>
                                </div>
                                <span class={`px-2.5 py-1 rounded-xl text-[11px] font-bold border ${SEMAFORO[getSemaforo(selectedLead).key].color}`}>
                                    Atendido en: {fmtSegundos(getSemaforo(selectedLead).segundos)}
                                </span>
                            </div>

                            <div class="space-y-4">
                                {/* Datos Rápidos */}
                                <div class="grid grid-cols-2 gap-3 bg-gray-50 p-3.5 rounded-2xl border border-gray-100 text-xs font-medium">
                                    <div>
                                        <span class="text-gray-400 block text-[9px] font-extrabold uppercase">Teléfono</span>
                                        <span class="text-gray-900 font-bold text-sm">{selectedLead.telefono}</span>
                                    </div>
                                    <div>
                                        <span class="text-gray-400 block text-[9px] font-extrabold uppercase">Proyecto</span>
                                        <span class="text-gray-900 font-bold text-sm uppercase">{selectedLead.proyecto || '—'}</span>
                                    </div>
                                </div>

                                {/* Reasignar Asesor */}
                                <div>
                                    <label class="block text-[10px] font-extrabold text-gray-400 uppercase tracking-widest mb-1.5">Asesor Asignado</label>
                                    <select 
                                        class="w-full border border-gray-200 rounded-xl p-3 text-sm font-semibold text-gray-700 bg-white"
                                        value={selectedLead.asesor || "Sin asignar"}
                                        onChange={(e) => handleUpdateField(selectedLead.id, 'asesor', e.target.value)}
                                    >
                                        {ASESORES.map(a => <option key={a} value={a}>{a}</option>)}
                                    </select>
                                </div>

                                {/* Tipificar Lead */}
                                <div>
                                    <label class="block text-[10px] font-extrabold text-gray-400 uppercase tracking-widest mb-1.5">Tipificación Comercial</label>
                                    <select 
                                        class="w-full border border-gray-200 rounded-xl p-3 text-sm font-semibold text-gray-700 bg-white"
                                        value={selectedLead.tipificacion}
                                        onChange={(e) => handleUpdateField(selectedLead.id, 'tipificacion', e.target.value)}
                                    >
                                        {TIPIFICACIONES.map(t => <option key={t} value={t}>{t}</option>)}
                                    </select>
                                </div>

                                {/* Parar Reloj */}
                                {!selectedLead.primer_contacto_seg && (
                                    <div class="bg-rose-50 border border-rose-100 rounded-2xl p-4">
                                        <h4 class="text-xs font-extrabold text-rose-800 uppercase tracking-wider mb-1">Contacto pendiente</h4>
                                        <p class="text-xs text-rose-700/90 mb-3">Si ya llamaste o enviaste el mensaje de WhatsApp, detén el cronómetro para registrar tu tiempo de respuesta.</p>
                                        <button 
                                            onClick={() => handleRegistrarContacto(selectedLead)}
                                            class="w-full bg-[#111827] hover:bg-black text-white font-bold py-2.5 px-4 rounded-xl text-xs transition-all tracking-wider uppercase"
                                        >
                                            ⏱️ Detener Cronómetro de Atención
                                        </button>
                                    </div>
                                )}

                                <div class="flex justify-end pt-2 border-t border-gray-100">
                                    <button onClick={() => setSelectedLead(null)} class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-4 py-2.5 rounded-xl text-xs font-bold transition-all">Cerrar</button>
                                </div>
                            </div>
                        </Modal>
                    )}
                </div>
            );
        }

        // ---------- SUB-COMPONENTE: MODAL ----------
        function Modal({ children, onClose }) {
            return (
                <div class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-50" onClick={onClose}>
                    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md p-6 relative max-h-[90vh] overflow-y-auto border border-gray-100" onClick={e => e.stopPropagation()}>
                        <button class="absolute top-5 right-5 text-gray-400 hover:text-gray-600 text-lg transition-all" onClick={onClose}>✕</button>
                        {children}
                    </div>
                </div>
            );
        }

        // ---------- SUB-COMPONENTE: FORMULARIO ----------
        function LeadForm({ onSave, onCancel }) {
            const [nombre, setNombre] = React.useState("");
            const [telefono, setTelefono] = React.useState("");
            const [email, setEmail] = React.useState("");
            const [fuente, setFuente] = React.useState(Object.keys(FUENTES_CONFIG)[0]);
            const [proyecto, setProyecto] = React.useState(PROYECTOS[0]);
            const [asesor, setAsesor] = React.useState(ASESORES[0]);

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!nombre || !telefono) {
                    alert("Por favor completa el nombre y el teléfono.");
                    return;
                }
                onSave({ nombre, telefono, email, fuente, proyecto, asesor });
            };

            return (
                <form onSubmit={handleSubmit} class="space-y-3.5">
                    <div>
                        <label class="block text-[9px] font-extrabold text-gray-400 uppercase tracking-widest mb-1">Nombre Completo *</label>
                        <input type="text" value={nombre} onChange={e => setNombre(e.target.value)} class="w-full border border-gray-200 rounded-xl p-3 text-sm focus:ring-2 focus:ring-[#111827]/10 focus:border-[#111827] outline-none font-semibold text-gray-800" placeholder="Ej. Carlos Pérez" required />
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-[9px] font-extrabold text-gray-400 uppercase tracking-widest mb-1">Teléfono *</label>
                            <input type="text" value={telefono} onChange={e => setTelefono(e.target.value)} class="w-full border border-gray-200 rounded-xl p-3 text-sm focus:ring-2 focus:ring-[#111827]/10 focus:border-[#111827] outline-none font-semibold text-gray-800" placeholder="999888777" required />
                        </div>
                        <div>
                            <label class="block text-[9px] font-extrabold text-gray-400 uppercase tracking-widest mb-1">Proyecto</label>
                            <select value={proyecto} onChange={e => setProyecto(e.target.value)} class="w-full border border-gray-200 rounded-xl p-3 text-sm focus:ring-2 focus:ring-[#111827]/10 focus:border-[#111827] outline-none bg-white font-semibold text-gray-700">
                                {PROYECTOS.map(p => <option key={p} value={p}>{p}</option>)}
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="block text-[9px] font-extrabold text-gray-400 uppercase tracking-widest mb-1">Email</label>
                        <input type="email" value={email} onChange={e => setEmail(e.target.value)} class="w-full border border-gray-200 rounded-xl p-3 text-sm focus:ring-2 focus:ring-[#111827]/10 focus:border-[#111827] outline-none font-semibold text-gray-800" placeholder="ejemplo@correo.com" />
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-[9px] font-extrabold text-gray-400 uppercase tracking-widest mb-1">Fuente</label>
                            <select value={fuente} onChange={e => setFuente(e.target.value)} class="w-full border border-gray-200 rounded-xl p-3 text-sm focus:ring-2 focus:ring-[#111827]/10 focus:border-[#111827] outline-none bg-white font-semibold text-gray-700">
                                {Object.keys(FUENTES_CONFIG).map(f => <option key={f} value={f}>{f}</option>)}
                            </select>
                        </div>
                        <div>
                            <label class="block text-[9px] font-extrabold text-gray-400 uppercase tracking-widest mb-1">Asignar Asesor</label>
                            <select value={asesor} onChange={e => setAsesor(e.target.value)} class="w-full border border-gray-200 rounded-xl p-3 text-sm focus:ring-2 focus:ring-[#111827]/10 focus:border-[#111827] outline-none bg-white font-semibold text-gray-700">
                                {ASESORES.map(a => <option key={a} value={a}>{a}</option>)}
                            </select>
                        </div>
                    </div>
                    <div class="flex justify-end gap-2.5 pt-3 border-t border-gray-100">
                        <button type="button" onClick={onCancel} class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-4 py-2.5 rounded-xl text-xs font-bold transition-all">Cancelar</button>
                        <button type="submit" class="bg-[#111827] hover:bg-gray-800 text-white px-4 py-2.5 rounded-xl text-xs font-bold transition-all">Crear Lead</button>
                    </div>
                </form>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<CRMInmobiliario />);
    </script>
</body>
</html>
