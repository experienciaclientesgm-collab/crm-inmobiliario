<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRMS - Gestión Inmobiliaria Sagama</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        @keyframes pulse-soft { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.8; transform: scale(0.96); } }
        .pulse-critical { animation: pulse-soft 2s infinite ease-in-out; }
    </style>
</head>
<body class="bg-[#F3F4F6] text-[#111827] min-h-screen">

    <div id="root"></div>

    <script type="text/babel">
        const SUPABASE_URL = "https://rjymgzlncuyyxytkvrcr.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable__Ke4zfQ8QyIsp7dIvrBQHw_yQ3yxQ1Z"; 
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const ASESORES = ["Sin asignar", "Facundo Auada", "Kevin Aparicio", "Brokersita (Admin)"];
        const PROYECTOS = ["San miguel - La Marina", "San Miguel - Faucett", "La Molina - La encantada"];
        const TIPIFICACIONES = ["Sin tipificar", "Interesado - Agenda visita", "Interesado - Solicita info", "Interesado - En seguimiento", "No contesta", "Buzón de voz", "Número equivocado", "No interesado", "Fuera de presupuesto", "Ya compró / descartado", "Cierre - Vendido"];
        
        const FUENTES_CONFIG = {
            "Meta Ads (FB/IG)": { bg: "bg-[#1877F2]/10 text-[#1877F2] border-[#1877F2]/20", label: "Meta Ads 🔵" },
            "TikTok Ads": { bg: "bg-[#000000]/10 text-[#000000] border-[#000000]/20", label: "TikTok 🎬" },
            "Google Ads": { bg: "bg-[#EA4335]/10 text-[#EA4335] border-[#EA4335]/20", label: "Google 🔴" },
            "WhatsApp": { bg: "bg-[#25D366]/10 text-[#25D366] border-[#25D366]/20", label: "WhatsApp 🟢" },
            "Sala de ventas": { bg: "bg-purple-50 text-purple-700 border-purple-200", label: "Físico 🏢" },
            "Otro": { bg: "bg-gray-100 text-gray-600 border-gray-200", label: "Otro 🌐" }
        };

        const SEMAFORO = {
            verde: { color: "bg-emerald-500 text-emerald-700 bg-emerald-50", label: "Óptimo" },
            amarillo: { color: "bg-amber-500 text-amber-700 bg-amber-50", label: "Aceptable" },
            naranja: { color: "bg-orange-500 text-orange-700 bg-orange-50", label: "Demora" },
            rojo: { color: "bg-rose-500 text-rose-700 bg-rose-50 pulse-critical", label: "Crítico" },
            gris: { color: "bg-gray-400 text-gray-600 bg-gray-50", label: "Sin contactar" }
        };

        function getSemaforo(lead) {
            if (!tienePrimerContacto(lead)) {
                const elapsed = (Date.now() - new Date(lead.fecha_ingreso).getTime()) / 1000;
                if (elapsed <= 30) return { key: "verde", segundos: elapsed };
                if (elapsed <= 120) return { key: "amarillo", segundos: elapsed };
                if (elapsed <= 300) return { key: "naranja", segundos: elapsed };
                return { key: "rojo", segundos: elapsed };
            }
            const s = lead.primer_contacto_seg;
            if (s <= 30) return { key: "verde", segundos: s };
            if (s <= 120) return { key: "amarillo", segundos: s };
            if (s <= 300) return { key: "naranja", segundos: s };
            return { key: "rojo", segundos: s };
        }

        function fmtSegundos(s) {
            if (s < 60) return `${Math.round(s)}s`;
            return `${Math.floor(s / 60)}m ${Math.round(s % 60)}s`;
        }

        function tienePrimerContacto(lead) {
            return lead.primer_contacto_seg !== null && lead.primer_contacto_seg !== undefined;
        }

        function CRMInmobiliario() {
            const [leads, setLeads] = React.useState([]);
            const [loaded, setLoaded] = React.useState(false);
            const [selectedLead, setSelectedLead] = React.useState(null);
            const [showNewLead, setShowNewLead] = React.useState(false);
            const [search, setSearch] = React.useState("");
            const [, forceTick] = React.useState(0);

            const stats = React.useMemo(() => {
                const conContacto = leads.filter(tienePrimerContacto);
                const promedio = items => items.length
                    ? items.reduce((total, item) => total + Number(item.primer_contacto_seg), 0) / items.length
                    : null;

                const mejorGrupo = (campo, excluir) => {
                    const grupos = conContacto.reduce((resultado, lead) => {
                        const nombre = lead[campo] || "Sin asignar";
                        if (excluir && excluir(nombre)) return resultado;
                        (resultado[nombre] ||= []).push(lead);
                        return resultado;
                    }, {});

                    return Object.entries(grupos)
                        .map(([nombre, items]) => ({ nombre, cantidad: items.length, sla: promedio(items) }))
                        .sort((a, b) => a.sla - b.sla || b.cantidad - a.cantidad)[0] || null;
                };

                const semaforo = leads.reduce((resultado, lead) => {
                    const estado = getSemaforo(lead).key;
                    resultado[estado] = (resultado[estado] || 0) + 1;
                    return resultado;
                }, { verde: 0, amarillo: 0, naranja: 0, rojo: 0, gris: 0 });

                return {
                    sla: promedio(conContacto),
                    atendidos: conContacto.length,
                    pendientes: leads.length - conContacto.length,
                    total: leads.length,
                    asesor: mejorGrupo("asesor", nombre => nombre === "Sin asignar"),
                    canal: mejorGrupo("fuente"),
                    semaforo
                };
            }, [leads]);

            React.useEffect(() => {
                async function fetchLeads() {
                    const { data } = await supabase.from('leads').select('*').order('fecha_ingreso', { ascending: false });
                    setLeads(data || []);
                    setLoaded(true);
                }
                fetchLeads();
                const channel = supabase.channel('leads').on('postgres_changes', { event: '*', schema: 'public', table: 'leads' }, fetchLeads).subscribe();
                const interval = setInterval(() => forceTick(n => n + 1), 1000);
                return () => { supabase.removeChannel(channel); clearInterval(interval); };
            }, []);

            const filteredLeads = leads.filter(l => (l.nombre?.toLowerCase().includes(search.toLowerCase()) || l.telefono?.includes(search)));

            return (
                <div class="min-h-screen">
                    <header class="bg-[#111827] text-white p-6 shadow-md">
                        <h1 class="font-black text-2xl">Sagama CRM</h1>
                    </header>
                    <main class="p-6 max-w-6xl mx-auto">
                        <section class="mb-6" aria-label="Resumen operativo">
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                                <div class="bg-white p-5 rounded-2xl border border-gray-100 shadow-sm">
                                    <p class="text-[10px] font-black text-gray-400 tracking-widest">SLA PROMEDIO</p>
                                    <div class="flex items-end justify-between gap-3 mt-2">
                                        <h3 class={`text-2xl font-black ${stats.sla === null ? 'text-gray-400' : stats.sla <= 30 ? 'text-emerald-600' : stats.sla <= 120 ? 'text-amber-600' : 'text-rose-600'}`}>
                                            {stats.sla === null ? "—" : fmtSegundos(stats.sla)}
                                        </h3>
                                        <span class="text-[10px] font-bold text-gray-400">{stats.atendidos} atendidos</span>
                                    </div>
                                    <p class="text-[10px] text-gray-400 mt-2">Tiempo hasta el primer contacto</p>
                                </div>
                                <div class="bg-white p-5 rounded-2xl border border-gray-100 shadow-sm">
                                    <p class="text-[10px] font-black text-gray-400 tracking-widest">ASESOR ESTRELLA</p>
                                    <h3 class="text-lg font-black text-amber-600 truncate mt-2">{stats.asesor ? stats.asesor.nombre : "Sin datos"}</h3>
                                    <p class="text-[10px] text-gray-400 mt-2">{stats.asesor ? `${fmtSegundos(stats.asesor.sla)} promedio · ${stats.asesor.cantidad} leads` : "Aparecerá al atender leads"}</p>
                                </div>
                                <div class="bg-white p-5 rounded-2xl border border-gray-100 shadow-sm">
                                    <p class="text-[10px] font-black text-gray-400 tracking-widest">CANAL ESTRELLA</p>
                                    <h3 class="text-lg font-black text-cyan-600 truncate mt-2">{stats.canal ? stats.canal.nombre : "Sin datos"}</h3>
                                    <p class="text-[10px] text-gray-400 mt-2">{stats.canal ? `${fmtSegundos(stats.canal.sla)} promedio · ${stats.canal.cantidad} leads` : "Aparecerá al atender leads"}</p>
                                </div>
                            </div>

                            <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-4">
                                <div class="flex items-center justify-between mb-3">
                                    <p class="text-[10px] font-black text-gray-400 tracking-widest">ESTADO DEL EMBUDO</p>
                                    <p class="text-[10px] font-bold text-gray-400">{stats.total} leads · {stats.pendientes} pendientes</p>
                                </div>
                                <div class="grid grid-cols-2 md:grid-cols-5 gap-3">
                                    {Object.entries(SEMAFORO).map(([key, value]) => (
                                        <div key={key} class="rounded-xl border border-gray-100 p-3 bg-gray-50">
                                            <div class="flex items-center justify-between gap-2">
                                                <span class={`w-2.5 h-2.5 rounded-full ${value.color.split(' ')[0]}`}></span>
                                                <strong class="text-xl font-black text-gray-800">{stats.semaforo[key]}</strong>
                                            </div>
                                            <span class="block text-[10px] font-bold uppercase tracking-wide text-gray-500 mt-2">{value.label}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </section>

                        <input type="text" placeholder="Buscar..." class="w-full p-4 mb-6 rounded-xl border" onChange={(e) => setSearch(e.target.value)}/>
                        
                        <div class="bg-white rounded-3xl border overflow-hidden">
                            <table class="w-full text-sm">
                                <thead class="bg-gray-50 border-b">
                                    <tr><th class="p-4">Nombre</th><th class="p-4">Proyecto</th><th class="p-4">Estado</th></tr>
                                </thead>
                                <tbody>
                                    {filteredLeads.map(lead => (
                                        <tr key={lead.id} class="border-b hover:bg-gray-50 cursor-pointer" onClick={() => setSelectedLead(lead)}>
                                            <td class="p-4 font-bold">{lead.nombre}</td>
                                            <td class="p-4">{lead.proyecto}</td>
                                            <td class="p-4">{lead.tipificacion}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </main>

                    {selectedLead && (
                        <div class="fixed inset-0 bg-black/50 flex items-center justify-center" onClick={() => setSelectedLead(null)}>
                            <div class="bg-white p-8 rounded-2xl w-96" onClick={e => e.stopPropagation()}>
                                <h2 class="font-black text-xl mb-4">{selectedLead.nombre}</h2>
                                <p>Teléfono: {selectedLead.telefono}</p>
                                <button onClick={() => setSelectedLead(null)} class="mt-6 bg-gray-900 text-white w-full py-2 rounded-xl">Cerrar</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<CRMInmobiliario />);
    </script>
</body>
</html>
